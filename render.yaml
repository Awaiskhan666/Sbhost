services:
  - type: web
    name: selfbot-host
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn wsgi:application
    envVars:
      - key: SESSION_SECRET
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: selfbot-db
          property: connectionString

databases:
  - name: selfbot-db
    databaseName: selfbot
    user: selfbot
